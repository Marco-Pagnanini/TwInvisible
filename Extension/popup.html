<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <form class="dropzone-box">

    <div class="buble"></div>
    <div class="buble"></div>
    <div class="buble"></div>

    <h2>Upload JSON File</h2>
    <p>Click to upload or drag and drop</p>
    <div class="dropzone-area">
      <!-- Icona di upload (opzionale) -->
      <div class="file-upload-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4v16m8-8H4"></path>
        </svg>
      </div>
      <!-- Input file invisibile -->
      <input type="file" required id="uploaded-file" accept=".json">
      <!-- Messaggio per file selezionato -->
      <p class="file-info">No Files Selected</p>
    </div>
    <div class="dropzone-description">
      <span class="dropzone-descriptions-span">Only .json files are allowed</span>
    </div>
    <div class="dropzone-actions">
      <div class="dropzone-help">
        Help Center
      </div>
      <div>
        <button type="reset">Cancel</button>
        <button id="submit-button" type="submit">Save</button>
      </div>
    </div>
  </form> 

  <script src="script.js"></script>

</body>

</html>
