<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
  <!-- Google Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

  <script src="https://unpkg.com/akar-icons-fonts"></script>
</head>

<body>

  <form class="dropzone-box">
    <h2>Upload JSON File</h2>
    <p>Click to upload or drag and drop</p>
    <div class="dropzone-area">
      <!-- Icona di upload (opzionale) -->
      <div class="file-upload-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4v16m8-8H4"></path>
        </svg>
      </div>
      <!-- Input file invisibile -->
      <input type="file" required id="uploaded-file" accept=".json">
      <!-- Messaggio per file selezionato -->
      <p class="file-info">No Files Selected</p>
    </div>
    <div class="dropzone-description">
      <span>Only .json files are allowed</span>
    </div>
    <div class="dropzone-actions">
      <div class="dropzone-help">
        Help Center
      </div>
      <div>
        <button type="reset">Cancel</button>
        <button id="submit-button" type="submit">Save</button>
      </div>
    </div>
  </form> 

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  <script src="script.js"></script>

  <script>
    AOS.init({
      duration: 800,
      once: false
    });
  </script>

</body>

</html>
